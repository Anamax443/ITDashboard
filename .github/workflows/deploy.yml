name: Deploy to 10.8.2.213

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, windows, itdashboard-prod]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Apply DB migrations
        working-directory: apps/server
        env:
          SQL_HOST: ${{ vars.SQL_HOST }}
          SQL_INSTANCE: ${{ vars.SQL_INSTANCE }}
          SQL_DATABASE: ${{ vars.SQL_DATABASE }}
          SQL_TRUSTED_CONNECTION: 'true'
        run: npm run migrate

      - name: Restart API Windows Service
        shell: powershell
        run: |
          Restart-Service -Name 'ITDashboardAPI' -Force
          Get-Service -Name 'ITDashboardAPI'
