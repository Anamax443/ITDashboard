name: Deploy to 10.8.2.213

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, windows, itdashboard-prod]
    timeout-minutes: 15
    defaults:
      run:
        shell: cmd
    env:
      RUNTIME_DIR: C:\Apps\ITDashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Sync source to runtime location
        # Mirror the checked-out tree into C:\Apps\ITDashboard so the NSSM-managed
        # service picks up the new code. Exclude node_modules (workspace-installed
        # in runtime dir) and .env (operator-owned at runtime).
        run: |
          robocopy . %RUNTIME_DIR% /MIR /XD node_modules _diag _work /XF .env /NFL /NDL /NJH /NJS /NC /NS
          if %ERRORLEVEL% GEQ 8 exit /b %ERRORLEVEL%
          exit /b 0

      - name: Install deps in runtime location
        working-directory: ${{ env.RUNTIME_DIR }}
        run: npm install --include-workspace-root

      - name: Typecheck
        working-directory: ${{ env.RUNTIME_DIR }}\apps\server
        run: npm run typecheck

      - name: Build server
        working-directory: ${{ env.RUNTIME_DIR }}\apps\server
        run: npm run build

      - name: Build browser UI
        working-directory: ${{ env.RUNTIME_DIR }}\apps\desktop
        run: npm run build

      - name: Apply DB migrations
        working-directory: ${{ env.RUNTIME_DIR }}\apps\server
        env:
          SQL_HOST: ${{ vars.SQL_HOST }}
          SQL_INSTANCE: ${{ vars.SQL_INSTANCE }}
          SQL_DATABASE: ${{ vars.SQL_DATABASE }}
          SQL_TRUSTED_CONNECTION: 'true'
        run: npm run migrate

      - name: Restart API Windows Service
        # net stop returns when STOP_PENDING; need to wait for full STOPPED before start.
        # Use sc with explicit polling so the new service definitely picks up new dist.
        run: |
          sc stop ITDashboardAPI
          :waitstop
          sc query ITDashboardAPI | findstr STOPPED >nul
          if errorlevel 1 (
            ping 127.0.0.1 -n 2 >nul
            goto waitstop
          )
          sc start ITDashboardAPI
          ping 127.0.0.1 -n 4 >nul
          sc query ITDashboardAPI

      - name: Smoke test — running binary SHA matches commit
        # Up to ~30s polling because Node boot + DB pool init can take a moment
        # after the service starts. Fails the job if the running /version/sha
        # does not match the deployed commit short SHA or the browser UI root
        # is not serving HTML. This catches both stale binaries and missing
        # frontend dist artefacts.
        run: |
          set EXPECTED=%GITHUB_SHA:~0,7%
          echo Expected SHA: %EXPECTED%
          set /a tries=0
          :smokeretry
          set /a tries+=1
          for /f "delims=" %%i in ('curl -s --max-time 3 http://127.0.0.1:4000/version/sha 2^>nul') do set ACTUAL=%%i
          set ACTUAL=%ACTUAL:"=%
          echo Attempt %tries%: actual=%ACTUAL%
          if "%ACTUAL%"=="%EXPECTED%" (
            curl -s --max-time 3 http://127.0.0.1:4000/ > "%RUNNER_TEMP%\itd-root.html"
            findstr /C:"root" "%RUNNER_TEMP%\itd-root.html" >nul
            if not errorlevel 1 (
              findstr /C:"/assets/" "%RUNNER_TEMP%\itd-root.html" >nul
              if not errorlevel 1 (
                echo SMOKE TEST OK — /version/sha matches %EXPECTED% and / serves browser UI
                exit /b 0
              )
            )
            echo SHA matched but / did not serve browser UI yet
          )
          if %tries% GEQ 15 (
            echo SMOKE TEST FAILED after %tries% attempts: expected %EXPECTED%, actual %ACTUAL%
            exit /b 1
          )
          ping 127.0.0.1 -n 3 >nul
          goto smokeretry
